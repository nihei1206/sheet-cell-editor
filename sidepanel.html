<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            padding: 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
            background-color: #f8f9fa;
        }

        h2 {
            font-size: 16px;
            margin-top: 0;
            color: #202124;
        }

        textarea {
            flex-grow: 1;
            resize: none;
            padding: 10px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        textarea:focus {
            outline: none;
            border-color: #1a73e8;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            transition: background 0.2s;
        }

        #loadBtn {
            background: #e8eaed;
            color: #3c4043;
        }

        #loadBtn:hover {
            background: #dadce0;
        }

        #saveBtn {
            background: #1a73e8;
            color: white;
        }

        #saveBtn:hover {
            background: #1557b0;
        }
    </style>
</head>

<body>
    <textarea id="editor" placeholder="Enter text here and press 'Save' to apply to the selected cell."></textarea>
    <div class="button-group">
        <button id="saveBtn">Save to cell</button>
    </div>
    <script src="sidepanel.js"></script>
</body>

</html>
